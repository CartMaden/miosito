<div id="twitch-live-container" style="max-width:1200px;margin:0 auto;padding:20px;text-align:center;font-family:Arial, sans-serif;">

  <h2 id="live-title">Prossima Live in arrivo</h2>
  <div id="countdown" style="font-size:20px;margin-bottom:20px;"></div>

  <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:20px;">

    <!-- PLAYER -->
    <iframe
      src="https://player.twitch.tv/?channel=itslaziodigital&parent=127.0.0.1"
      height="480"
      width="800"
      allowfullscreen>
    </iframe>

    <!-- CHAT -->
    <iframe
      src="https://www.twitch.tv/embed/itslaziodigital/chat?parent=127.0.0.1"
      height="480"
      width="350">
    </iframe>

  </div>
</div>

<script>
// 🔴 INSERISCI DATA LIVE (anno, mese-1, giorno, ora, minuti)
var liveDate = new Date(2026, 2, 8, 16, 0, 0); // ESEMPIO 28 Febbraio 2026 ore 21:00

var countdownElement = document.getElementById("countdown");
var titleElement = document.getElementById("live-title");

var timer = setInterval(function() {
  var now = new Date().getTime();
  var distance = liveDate - now;

  if (distance < 0) {
    clearInterval(timer);
    countdownElement.innerHTML = "Siamo Live!";
    titleElement.innerHTML = "🔴 Live in corso";
    return;
  }

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  countdownElement.innerHTML = 
    days + "g " + hours + "h " + minutes + "m " + seconds + "s ";
}, 1000);
</script>
